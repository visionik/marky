version: '3'

tasks:
  default:
    desc: List available tasks
    cmd: task --list

  build:
    desc: Build all packages
    cmd: pnpm -r build

  test:
    desc: Run all tests
    cmd: pnpm vitest run

  test:coverage:
    desc: Run tests with coverage (fails below 85%)
    cmd: pnpm vitest run --coverage

  typecheck:
    desc: Type-check all packages
    cmd: pnpm -r typecheck

  lint:
    desc: Lint all TypeScript source files
    cmd: pnpm eslint packages/

  fmt:
    desc: Format code with Prettier
    cmd: pnpm prettier --write 'packages/*/src/**/*.ts'

  fmt:check:
    desc: Check formatting (no writes)
    cmd: pnpm prettier --check 'packages/*/src/**/*.ts'

  lint:docs:
    desc: Lint all Markdown files in the repository with marky
    cmd: |
      node packages/cli/dist/bin.js lint \
        .github/PULL_REQUEST_TEMPLATE.md \
        agents.md \
        CHANGELOG.md \
        packages/compat-markdownlint/README.md \
        packages/core/README.md \
        ROADMAP.md

  check:
    desc: Run all pre-commit checks (fmt:check, lint, typecheck, test:coverage)
    deps: [fmt:check, lint, typecheck, test:coverage]

  clean:
    desc: Remove all build artifacts
    cmd: pnpm -r --if-present clean

  docs:dev:
    desc: Start the docs dev server (Astro Starlight)
    cmd: pnpm -C docs dev

  docs:build:
    desc: Build the static docs site
    cmd: pnpm -C docs build

  docs:preview:
    desc: Preview the built docs site locally
    cmd: pnpm -C docs preview

  release:
    desc: "Bump version, update CHANGELOG, tag, and push. Usage: task release -- <major|minor|patch>"
    requires:
      vars: [CLI_ARGS]
    cmds:
      - task check
      - node scripts/release.mjs {{.CLI_ARGS}}
