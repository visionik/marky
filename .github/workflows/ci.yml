name: CI

on:
  push:
    branches: [main, 'phase-*', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (Node ${{ matrix.node-version }})
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        node-version: ['20', '22', '24']

    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: '3.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # version read automatically from package.json "packageManager" field

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @crackdown/core
        run: pnpm --filter @crackdown/core build

      - name: Run task check (fmt · lint · typecheck · test · coverage)
        run: task check

      - name: Upload coverage report
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  lint-markdown:
    name: lint markdown
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      security-events: write  # required for upload-sarif

    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: '3.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Lint Markdown with crackdown (pretty)
        run: task lint:docs

      - name: Generate SARIF report
        if: always()
        run: |
          node packages/cli/dist/bin.js lint \
            .github/PULL_REQUEST_TEMPLATE.md \
            agents.md \
            CHANGELOG.md \
            packages/compat-markdownlint/README.md \
            packages/core/README.md \
            ROADMAP.md \
            --format sarif \
            --repo-root ${{ github.workspace }} \
            --output crackdown-results.sarif

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: crackdown-results.sarif
          category: crackdown-markdown
